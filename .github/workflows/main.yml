name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Buildozer
        uses: digi-monkey/buildozer-action@v1
        with:
          python-version: 3.11
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pro-Watch-Package
          path: bin/*.apk
          
